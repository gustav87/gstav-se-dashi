trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: Docker@2
  displayName: 'Build and push frontend'
  inputs:
    containerRegistry: 'gustav87 Docker Hub'
    repository: 'gustav87/gstav-se-dashi-frontend'
    command: 'buildAndPush'
    Dockerfile: '**/frontend/Dockerfile'
    buildContext: '**'

